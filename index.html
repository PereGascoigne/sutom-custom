<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sutom Custom</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background:#121213; color:white; }
    h1 { color:#ff3b3b; letter-spacing:2px; }

    #grid { margin-top:20px; }
    .row { display:flex; justify-content:center; margin-bottom:6px; }

    .cell {
      width:52px; height:52px; margin:3px;
      border:2px solid #3a3a3c;
      display:flex; align-items:center; justify-content:center;
      font-size:26px; font-weight:bold; text-transform:uppercase;
      background:#121213; color:white;
      perspective: 600px;
    }

    .inner { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

    .flip { animation: flip 0.6s ease forwards; }

    @keyframes flip {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .correct { background:#ff3b3b; border-color:#ff3b3b; }
    .present { background:#ffd700; border-color:#ffd700; color:black; }
    .absent { background:#3a3a3c; border-color:#3a3a3c; }

    input, button { padding:10px; margin:5px; font-size:16px; border-radius:5px; border:none; }
    button { background:#ff3b3b; color:white; cursor:pointer; }

    #keyboard { margin-top:20px; }
    .key { display:inline-block; padding:10px; margin:3px; background:#818384; border-radius:4px; min-width:30px; }
    .key.correct { background:#ff3b3b; }
    .key.present { background:#ffd700; color:black; }
    .key.absent { background:#3a3a3c; }
  </style>
</head>
<body>

<h1>SUTOM</h1>

<div id="setup">
  <input type="text" id="secret" placeholder="Mot secret">
  <button onclick="createLink()">Créer lien</button>
</div>

<div id="game" style="display:none;">
  <input type="text" id="guess">
  <button onclick="submitGuess()">Valider</button>
  <div id="grid"></div>
  <div id="keyboard"></div>
</div>

<script>
let secretWord = "";
let attempts = 0;
const maxAttempts = 6;
const alphabet = "AZERTYUIOPQSDFGHJKLMWXCVBN";

// 🔗 Créer un lien avec le mot
function createLink() {
  const word = document.getElementById('secret').value.toUpperCase();
  if (!word) return alert("Entre un mot");

  const encoded = btoa(word);
  const url = window.location.origin + window.location.pathname + "?word=" + encoded;

  navigator.clipboard.writeText(url);
  alert("Lien copié ! Envoie-le 😎\n" + url);
}

// 🔓 Charger depuis URL
function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get("word");

  if (encoded) {
    secretWord = atob(encoded);
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    initGrid();
    initKeyboard();
  }
}

function initGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  for (let i = 0; i < maxAttempts; i++) {
    const row = document.createElement('div');
    row.className = 'row';

    for (let j = 0; j < secretWord.length; j++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const inner = document.createElement('div');
      inner.className = 'inner';

      if (j === 0 && i === 0) {
        inner.textContent = secretWord[0];
        cell.classList.add('correct');
      }

      cell.appendChild(inner);
      row.appendChild(cell);
    }

    grid.appendChild(row);
  }
}

function initKeyboard() {
  const keyboard = document.getElementById('keyboard');
  keyboard.innerHTML = "";

  for (let letter of alphabet) {
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = letter;
    key.id = 'key-' + letter;
    keyboard.appendChild(key);
  }
}

function submitGuess() {
  const guessInput = document.getElementById('guess');
  const guess = guessInput.value.toUpperCase();

  if (guess.length !== secretWord.length) {
    return alert("Mauvaise longueur");
  }

  const row = document.getElementsByClassName('row')[attempts];

  [...guess].forEach((letter, i) => {
    const cell = row.children[i];
    const inner = cell.firstChild;
    const key = document.getElementById('key-' + letter);

    setTimeout(() => {
      inner.textContent = letter;
      cell.classList.add('flip');

      setTimeout(() => {
        if (letter === secretWord[i]) {
          cell.classList.add('correct');
          key.classList.add('correct');
        } else if (secretWord.includes(letter)) {
          cell.classList.add('present');
          if (!key.classList.contains('correct')) key.classList.add('present');
        } else {
          cell.classList.add('absent');
          key.classList.add('absent');
        }
      }, 300);
    }, i * 400);
  });

  attempts++;

  setTimeout(() => {
    if (guess === secretWord) {
      alert("Gagné !");
    } else if (attempts >= maxAttempts) {
      alert("Perdu ! Mot : " + secretWord);
    }
  }, guess.length * 400);

  guessInput.value = "";
}

// lancer si lien
loadFromURL();
</script>

</body>
</html>
