<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sutom Ultra</title>
<style>
body { font-family: Arial; background:#1e3a8a; color:white; text-align:center; }
h1 { color:#ff3b3b; }

#grid { margin-top:20px; }
.row { display:flex; justify-content:center; }

.cell {
  width:55px; height:55px; margin:3px;
  border:2px solid white;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:bold;
  text-transform:uppercase;
  background:#1e3a8a;
  transition: transform 0.6s;
}

.flip { transform: rotateX(360deg); }

.correct { background:#ff3b3b; border-color:#ff3b3b; }
.present { background:#ffd700; border-color:#ffd700; color:black; }
.absent { background:#2c2c2c; border-color:#2c2c2c; }

#keyboard { margin-top:20px; }
.key {
  display:inline-block;
  padding:12px;
  margin:4px;
  background:#d1d5db;
  color:black;
  border-radius:6px;
  cursor:pointer;
  min-width:30px;
}

.key.correct { background:#ff3b3b; color:white; }
.key.present { background:#ffd700; }
.key.absent { background:#444; color:white; }
</style>
</head>
<body>

<h1>SUTOM</h1>

<div id="setup">
  <input type="text" id="secret" placeholder="Mot secret">
  <button onclick="createLink()">Créer lien</button>
</div>

<div id="game" style="display:none;">
  <div id="grid"></div>
  <div id="keyboard"></div>
</div>

<script>
let secretWord="";
let attempts=0;
let currentGuess="";
const maxAttempts=6;
const alphabetRows=["AZERTYUIOP","QSDFGHJKLM","WXCVBN"];

function save(){
localStorage.setItem("sutom_ultra",JSON.stringify({secretWord,attempts,currentGuess,grid:document.getElementById('grid').innerHTML}))
}

function load(){
const s=localStorage.getItem("sutom_ultra");
if(!s)return false;
const d=JSON.parse(s);
secretWord=d.secretWord;attempts=d.attempts;currentGuess=d.currentGuess;
document.getElementById('setup').style.display='none';
document.getElementById('game').style.display='block';
document.getElementById('grid').innerHTML=d.grid;
initKeyboard();return true;
}

function createLink(){
const w=document.getElementById('secret').value.toUpperCase();
if(!w)return alert("Mot");
const url=location.origin+location.pathname+"?w="+btoa(w);
navigator.clipboard.writeText(url);
alert("Lien copié")
}

function loadURL(){
const p=new URLSearchParams(location.search);
if(p.get("w")){secretWord=atob(p.get("w"));start();}
}

function start(){
document.getElementById('setup').style.display='none';
document.getElementById('game').style.display='block';
initGrid();initKeyboard();save();
}

function initGrid(){
const g=document.getElementById('grid');g.innerHTML="";
for(let i=0;i<maxAttempts;i++){
let r=document.createElement('div');r.className='row';
for(let j=0;j<secretWord.length;j++){
let c=document.createElement('div');c.className='cell';
if(j===0){
  c.textContent=secretWord[0];
  c.classList.add('correct');
}
r.appendChild(c);
}
g.appendChild(r);
}
}

function initKeyboard(){
const k=document.getElementById('keyboard');k.innerHTML="";
alphabetRows.forEach(row=>{
let div=document.createElement('div');
for(let l of row){
let key=document.createElement('span');
key.className='key';key.textContent=l;
key.onclick=()=>press(l);
div.appendChild(key);
}
k.appendChild(div);
});
let enter=document.createElement('span');enter.textContent="ENTER";enter.className='key';enter.onclick=validate;
let del=document.createElement('span');del.textContent="⌫";del.className='key';del.onclick=delLetter;
k.appendChild(enter);k.appendChild(del);
}

function press(l){
if(currentGuess.length>=secretWord.length-1)return;
currentGuess+=l;update();save();
}

function delLetter(){
currentGuess=currentGuess.slice(0,-1);update();save();
}

function update(){
let row=document.getElementsByClassName('row')[attempts];
for(let i=0;i<secretWord.length;i++){
if(i===0) continue;
row.children[i].textContent=currentGuess[i-1]||"";
}
}

function evaluate(guess,word){
let res=Array(guess.length).fill('absent');
let wArr=word.split('');

for(let i=0;i<guess.length;i++){
if(guess[i]===wArr[i]){res[i]='correct';wArr[i]=null;}
}

for(let i=0;i<guess.length;i++){
if(res[i]==='correct')continue;
let idx=wArr.indexOf(guess[i]);
if(idx!==-1){res[i]='present';wArr[idx]=null;}
}
return res;
}

function validate(){
if(currentGuess.length!==secretWord.length-1)return;
let fullGuess=secretWord[0]+currentGuess;
let row=document.getElementsByClassName('row')[attempts];
let result=evaluate(fullGuess,secretWord);

result.forEach((r,i)=>{
let cell=row.children[i];
setTimeout(()=>{
cell.classList.add('flip');
setTimeout(()=>{
cell.classList.add(r);
updateKey(fullGuess[i],r);
},300);
},i*400);
});

attempts++;currentGuess="";save();

setTimeout(()=>{
if(result.every(x=>x==='correct')) alert("Gagné !");
else if(attempts>=maxAttempts) alert("Perdu: "+secretWord);
},secretWord.length*400);
}

function updateKey(letter,state){
let key=[...document.getElementsByClassName('key')].find(k=>k.textContent===letter);
if(!key)return;
if(state==='correct') key.className='key correct';
else if(state==='present'&&!key.classList.contains('correct')) key.className='key present';
else if(state==='absent'&&!key.classList.contains('correct')) key.className='key absent';
}

// Chargement intelligent (fix bug double saisie)
if (!load()) {
  const params = new URLSearchParams(location.search);
  const encoded = params.get("w");

  if (encoded) {
    secretWord = atob(encoded);
    start();
  }
}
</script>

</body>
</html>
